services:
  # --- SERVICIO 1: LA BASE DE DATOS ---
  letswork_db:
    image: mysql:8.0
    container_name: letswork_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=letswork
      - TZ=America/Argentina/Buenos_Aires
    volumes:
      - letswork_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- SERVICIO 2: TU APP WEB EN PHP ---
  app-php:
    image: php:8.2-apache
    container_name: letswork_web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./letsWork:/var/www/html
    env_file:
      - .env
    command: sh -c "docker-php-ext-install pdo pdo_mysql && a2enmod rewrite && apache2-foreground"
    depends_on:
      - letswork_db
    environment:
      - DB_HOST=letswork_db
      - DB_NAME=letswork
      - DB_USER=root
      - DB_PASS=root
      - BASE_URL=http://localhost:8080/
      - TZ=America/Argentina/Buenos_Aires
      - API_URL=http://letswork_api:8000/

  # --- SERVICIO 3: TU API EN PYTHON (FASTAPI) ---
  api-python:
    image: python:3.10-slim
    container_name: letswork_api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./letswork-api:/app
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn requests && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  letswork_data: